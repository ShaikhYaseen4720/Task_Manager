<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#6d28d9,#9333ea);
        }

        .container{
            width:380px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#6d28d9;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border-color:#6d28d9;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#6d28d9;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#5b21b6;
        }

        .message{
            margin-top:15px;
            text-align:center;
            font-size:14px;
        }

        .link{
            text-align:center;
            margin-top:20px;
        }

        .link a{
            color:#6d28d9;
            text-decoration:none;
            font-weight:bold;
        }

        .link a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Create Account</h1>

        <form id="registerForm">

            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter username"
                    required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    required>
            </div>

            <button type="submit">
                Register
            </button>

            <div class="message" id="message"></div>

            <div class="link">
                Already have an account?
                <a href="./login.html">
                    Login
                </a>
            </div>

        </form>
    </div>

    <script>
        const form = document.getElementById("registerForm");
        const message = document.getElementById("message");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            try {

                const response = await fetch(
                    "http://localhost:3000/auth/register",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username,
                            password
                        })
                    }
                );

                const data = await response.json();
                console.log(data)

                if(response.status === 201){
                    message.style.color = "green";
                }
                else{
                    message.style.color = "red";
                }

                message.textContent =
                    data.message;

            }
            catch(error){
                message.style.color = "red";
                message.textContent =
                    "Unable to connect to server.";
            }
        });
    </script>

</body>
</html>
